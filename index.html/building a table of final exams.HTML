<!-- This is a simple HTML page that builds a table of final exam grades for a Calculus class. The table includes the students' last names, first names, and their corresponding grades. Additionally, it calculates and displays the average grade at the bottom of the table. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Calculus Final Exams Table</title>
    <meta charset="UTF-8" />
  </head>
  <body>
    <!-- The table below displays the final exam grades for a Calculus class, including student names and their respective grades, along with the average grade at the end. -->
    <table>
      <caption>
        Calculus Final Exam Grades
      </caption>
      <!-- The table header defines the columns for Last Name, First Name, and Grade. -->
      <thead>
        <tr>
          <th>Last Name</th>
          <th>First Name</th>
          <th>Grade</th>
        </tr>
      </thead>
      <!-- The table body contains the rows of student data, including their last names, first names, and final exam grades. -->
      <tbody>
        <tr>
          <td>Davis</td>
          <td>Alex</td>
          <td>54</td>
        </tr>
        
        <tr>
          <td>Doe</td>
          <td>Samantha</td>
          <td>92</td>
        </tr>

        <tr>
          <td>Rodriguez</td>
          <td>Marcus</td>
          <td>88</td>
        </tr>

        <tr>
          <td>Thompson</td>
          <td>Jane</td>
          <td>77</td>
        </tr>

        <tr>
          <td>Williams</td>
          <td>Natalie</td>
          <td>83</td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <td colspan="2">Average Grade</td>
          <td>78.8</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
