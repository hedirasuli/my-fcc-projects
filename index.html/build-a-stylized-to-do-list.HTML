<!-- This is a simple HTML document that creates a stylized to-do list with checkboxes and links -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>

    <link rel="stylesheet" href="styles.css">
</head>

<!-- The body of the document contains an unordered list with the class "todo-list". Each list item represents a task with a checkbox and a label. When a checkbox is checked, the corresponding task is considered completed. Each task also has a nested unordered list with the class "sub-item" that contains a link related to the task. The links open in a new tab when clicked. -->
<body>
    <ul class="todo-list">

        <li>
            <input type="checkbox" id="like-video">
            <label for="like-video">Like this video</label>
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" href="https://www.example.com/video-link" target="_blank">Link to video</a>
                </li>
            </ul>
        </li>

        <li>
            <input type="checkbox" id="subscribe">
            <label for="subscribe">Subscribe to the channel</label>
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" href="https://www.example.com/subscribe-link" target="_blank">Link to subscribe</a>
                </li>
            </ul>
        </li>

        <li>
            <input type="checkbox" id="visit-site">
            <label for="visit-site">Visit the website</label>
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" href="https://www.example.com/site-link" target="_blank">Visit site</a>
                </li>
            </ul>
        </li>

        <li>
            <input type="checkbox" id="linkedin">
            <label for="linkedin">Connect on LinkedIn</label>
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" href="https://www.example.com/linkedin-link" target="_blank">Link to LinkedIn</a>
                </li>
            </ul>
        </li>
    </ul>
</body>
</html>
