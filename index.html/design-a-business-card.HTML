<!-- This is a simple HTML page that designs a business card for a web developer named Alex. The card includes a profile image, full name, designation, company name, contact information, a portfolio link, and social media links. The styling is done using an external CSS file to create an attractive and professional layout. -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Business Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<!-- The body of the business card contains a profile image, the individual's full name, designation, company name, contact information, a portfolio link, and social media links. The layout is styled to be visually appealing and professional. -->
<body>
    <div class="business-card">
        <img class="profile-image"
            src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg" alt="Hard work">
        <p class="full-name">Alex</p>
        <p class="designation">Web Developer</p>
        <p class="company">HUMMEL</p>
        <hr>
        <p>alex.hemund@gmail.com</p>
        <p>(555) 555-5555</p>

        <a class="portfolio-link" href="https://www.freecodecamp.org">
            Portfolio
        </a>
        <hr>
        <!-- The social media section includes links to Twitter, LinkedIn, and GitHub, allowing others to connect with the individual professionally. -->
        <div class="social-media">
            <h2>Connect with me</h2>
            <a href="https://www.twitter.com">Twitter</a>
            <a href="https://www.linkedin.com">LinkedIn</a>
            <a href="https://www.github.com">GitHub</a>
        </div>
    </div>
</body>

</html>
