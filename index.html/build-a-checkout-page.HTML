<!-- This is a simple HTML document that creates a checkout page with a cart section and a payment information form -->


<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Page</title>
</head>
<body>

    <h1>Checkout</h1>
<!-- The first section of the checkout page displays the customer's cart with an image of a product -->
    <section>
        <h2>Your Cart</h2>
        <img src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="A floating blue geometric cube.">
    </section>
<!-- The second section of the checkout page contains a form for the customer to enter their payment information, including the cardholder name and card number -->
    <section>
        <h2>Payment Information</h2>
        <form>
            <label for="card-name">
                Cardholder Name:
                <span aria-hidden="true">*</span>
            </label>
            <input type="text" id="card-name" name="card-name" required>

            <label for="card-number">
                Card Number:
                <span aria-hidden="true">*</span>
            </label>
            <input type="text" id="card-number" name="card-number" required aria-describedby="card-number-help">
            <p id="card-number-help">Please enter a valid 16-digit card number.</p>

            <button type="submit">Submit Payment</button>
        </form>
    </section>

</body>
</html>
