<!DOCTYPE html>
<!-- Document type declaration: HTML5 -->
<html lang="en">
  <!-- Root element with language set to English -->
    <head>
      <!-- Meta information and document settings -->
      <meta charset="UTF-8" />
      <meta http-equiv="X-UA-Compatible" content="IE=edge" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Decimal to Binary Converter</title>
      <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
      <!-- Visible content of the page -->
      
      <!-- Main heading -->
      <h1>
        Decimal to Binary <br />
        Converter
      </h1>
      <!-- Input section: where user enters a decimal number -->
      <section class="input-container">
        <label for="number-input">Enter a decimal number:</label>
        <!-- Number input field (initial value empty) -->
        <input
          value=""
          type="number"
          name="decimal number input"
          id="number-input"
          class="number-input"
        />
        <!-- Convert button that triggers the conversion -->
        <button class="convert-btn" id="convert-btn">Convert</button>
      </section>
      <!-- Output section: displays the conversion result and call stack animation -->
      <section class="output-container">
        <output id="result" for="number-input"></output>
        <h2>Call stack</h2>
        <!-- Container for the call stack animation (used in the recursive conversion process) -->
        <div id="animation-container"></div>
      </section>
      <!-- External JavaScript file containing the conversion logic -->
      <script src="script.js"></script>
    </body>
</html>
