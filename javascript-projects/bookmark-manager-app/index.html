<!DOCTYPE html>
<!-- Document type declaration: HTML5 -->
<html lang="en">
    <!-- Root element with language set to English -->
    <head>
        <!-- Meta information and document settings -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=0.0">
        <title>Bookmark Manager</title>
        <link rel="stylesheet" href="styles.css">
    </head>

        <body>
            <!-- Visible content of the page -->
            <main>
                <!-- Main content area -->

                <!-- Main section: Header, dropdown, and action buttons -->
                <section id="main-section">
                    <h1>Bookmark Manager</h1>
                    <!-- Dropdown container for category selection -->
                    <div id="dropdown">
                        <label for="category-dropdown">Select a category:</label>
                        <select id="category-dropdown" name="options">
                            <option value="news" selected>News</option>
                            <option value="entertainment">Entertainment</option>
                            <option value="work">Work</option>
                            <option value="miscellaneous">Miscellaneous</option>
                        </select>
                    </div>
                    <!-- Action buttons -->
                    <div id="buttons">
                        <button type="button" id="view-category-button">View Category</button>
                        <button type="button" id="add-bookmark-button">Add Bookmark</button>
                    </div>
                </section>
                <!-- Form section: Hidden by default (class="hidden"), used for adding new bookmarks -->
                <section id="form-section" class="hidden">
                    <form>
                        <!-- Category name heading (dynamically updated) -->
                        <h2 class="category-name"></h2>
                        <div>
                            <!-- Name input field -->
                            <label for="name">Name:</label>
                            <input type="text" id="name">
                        </div>
                        <div>
                            <!-- URL input field -->
                            <label for="url">URL:</label>
                            <input type="text" id="url">
                        </div>
                        <!-- Form action buttons -->
                        <div>
                            <button type="button" id="close-form-button">Go Back</button>
                            <button type="button" id="add-bookmark-button-form">Add Bookmark</button>
                        </div>
                    </form>
                </section>
                <!-- Bookmark list section: Hidden by default, displays bookmarks for a category -->
                <section id="bookmark-list-section" class="hidden">
                    <h2 class="category-name"></h2>
                    <div id="category-list">
                    </div>
                    <!-- List action buttons -->
                    <div>
                        <!-- Button to close list and go back to main section -->
                        <button type="button" id="close-list-button">Go Back</button>
                        <!-- Button to delete selected bookmark -->
                        <button type="button" id="delete-bookmark-button">Delete Bookmark</button>
                    </div>
                </section>
            </main>
                <!-- External JavaScript file containing bookmark manager logic -->
                <script src="bookmark-manager-app.js"></script>
        </body>
</html>
