<!DOCTYPE html>
<!-- Document type declaration: HTML5 -->
<html lang="en">
    <!-- Root element with language set to English -->
        <head>
            <!-- Meta information and document settings -->
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Modern Dopamine Calculator</title>
            <link rel="stylesheet" href="styles.css">
        </head>

    <body>
        <!-- Visible content of the page -->

        <!-- Main calculator container -->
        <div class="calculator">
            <!-- Display area showing input and results -->
            <div class="display">
                <!-- Read-only input field showing current value or result -->
                <input type="text" id="result" placeholder="0" readonly>
            </div>
            <!-- Calculator buttons grid -->
            <div class="buttons">

                <!-- Row 1: Clear, Square Root, Square, Division -->
                <!-- Clear button: resets the display -->
                <button class="btn clear" onclick="clearDisplay()">C</button>
                <!-- Square root button: calculates sqrt of current value -->
                <button class="btn operator" onclick="performSpecial('sqrt')">√</button>
                <!-- Square button: squares the current value -->
                <button class="btn operator" onclick="performSpecial('sqr')">x²</button>
                <!-- Division operator -->
                <button class="btn operator" onclick="appendValue('/')">/</button>

                <!-- Row 2: 7, 8, 9, Multiplication -->
                <button class="btn" onclick="appendValue('7')">7</button>
                <button class="btn" onclick="appendValue('8')">8</button>
                <button class="btn" onclick="appendValue('9')">9</button>
                <button class="btn operator" onclick="appendValue('*')">*</button>
                <!-- Row 3: 4, 5, 6, Subtraction -->
                <button class="btn" onclick="appendValue('4')">4</button>
                <button class="btn" onclick="appendValue('5')">5</button>
                <button class="btn" onclick="appendValue('6')">6</button>
                <button class="btn operator" onclick="appendValue('-')">-</button>
                <!-- Row 4: 1, 2, 3, Addition -->
                <button class="btn" onclick="appendValue('1')">1</button>
                <button class="btn" onclick="appendValue('2')">2</button>
                <button class="btn" onclick="appendValue('3')">3</button>
                <button class="btn operator" onclick="appendValue('+')">+</button>
                <!-- Row 5: 0, Decimal Point, Equals -->
                <button class="btn" onclick="appendValue('0')">0</button>
                <button class="btn" onclick="appendValue('.')">.</button>
                <button class="btn equal" onclick="calculate()">=</button>
            </div>
            <!-- End of buttons -->
        </div>
        <!-- End of calculator -->

        <!-- External JavaScript file containing calculator logic -->
                  <script src="script.js"></script>
    </body>
</html>
