<!DOCTYPE html>
<!-- Document type declaration: HTML5 -->
<html lang="en">
  <!-- Root element with language set to English -->
    <head>
      <!-- Meta information and document settings -->
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="stylesheet" href="styles.css" />
      <title>Calorie Counter</title>
    </head>
    <body>
      <!-- Visible content of the page -->
      <main>
        <!-- Main content area -->
        <h1>Calorie Counter</h1>
        <div class="container">
          <!-- Form containing all calorie tracking inputs -->
          <form id="calorie-counter">
            <!-- Daily calorie budget input -->
            <label for="budget">Budget</label>
            <input
              type="number"
              min="0"
              id="budget"
              placeholder="Daily calorie budget"
              required
            />

            <!-- Breakfast section -->
            <fieldset id="breakfast">
              <legend>Breakfast</legend>
              <div class="input-container"></div>
            </fieldset>

            <!-- Lunch section -->
            <fieldset id="lunch">
              <legend>Lunch</legend>
              <div class="input-container"></div>
            </fieldset>

            <!-- Dinner section -->
            <fieldset id="dinner">
              <legend>Dinner</legend>
              <div class="input-container"></div>
            </fieldset>

            <!-- Snacks section -->
            <fieldset id="snacks">
              <legend>Snacks</legend>
              <div class="input-container"></div>
            </fieldset>

            <!-- Exercise section -->
            <fieldset id="exercise">
              <legend>Exercise</legend>
              <div class="input-container"></div>
            </fieldset>

            <!-- Controls section: dropdown and add entry button -->
            <div class="controls">
              <span>
                <label for="entry-dropdown">Add food or exercise:</label>
                <!-- Dropdown to select which category to add an entry to -->
                <select id="entry-dropdown" name="options">
                  <option value="breakfast" selected>Breakfast</option>
                  <option value="lunch">Lunch</option>
                  <option value="dinner">Dinner</option>
                  <option value="snacks">Snacks</option>
                  <option value="exercise">Exercise</option>
                </select>
                <!-- Button to add a new entry to the selected category -->
                <button type="button" id="add-entry">Add Entry</button>
              </span>
            </div>
            <!-- Form action buttons -->
            <div>
              <!-- Submit button: calculates remaining calories -->
              <button type="submit">
                Calculate Remaining Calories
              </button>
              <!-- Clear button: resets the form -->
              <button type="button" id="clear">Clear</button>
            </div>
          </form>
          <!-- Output area where calculated results are displayed (hidden by default) -->
          <div id="output" class="output hide"></div>
        </div>
      </main>
      <!-- External JavaScript file containing calorie counter logic -->
      <script src="calorie-counter.js"></script>
    </body>
</html>
