<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Crypto Converter - USDT</title>
        <link rel="stylesheet" href="style.css">
    
    </head>
    <body>
        <div class="converter-card">
            <h2>USDT Converter</h2>

            <div class="input-group">
                <labele>Amount (USDT)</labele>
                <input type="number" id="Amount" placeholder="Enter amount" value="1">
            </div>
            <div class="input-group">
                <label>Convert To</label>
                <select id="currency-select">
                    <option value="USD">US Dollar (USD)</option>
                    <option value="EUR">Euro (EUR)</option>
                    <option value="IRR">Iranian Rial (IRR)</option>
                </select>
                </div>
                <div class="result-area">
                    <p id="result-text">0.00</p>
                    <span id="rate-info">Loading rates...</span>  </div>
        </div>
        <script type="module" src="dist/app.js"></script>
    </body>
</html>
