<!DOCTYPE html>
<html lang= "en">
    <head>
        <meta charset="UTF-8">
        <title>TS API Dashboard</title>
        <style>
            body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        #posts-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
        }
        .card { 
            background: white; padding: 15px; border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 5px solid #007acc;
        }
        .card h3 { margin-top: 0; color: #333; font-size: 1.1rem; }
        .card p { color: #666; font-size: 0.9rem; }
        .user-tag { font-size: 0.8rem; color: #007acc; font-weight: bold; }
        </style>
    </head>
    <body>
        <h1>Community Posts</h1>
        <div id="posts-container"></div>
        <script type="module" src="./dist/app.js"></script>
    </body>
</html>
