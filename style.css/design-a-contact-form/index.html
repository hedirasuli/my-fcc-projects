<!DOCTYPE html>
<!-- Document type declaration: HTML5 -->
<html lang="en">
    <!-- Root element with language set to English -->
    <head>
        <!-- Meta information and document settings -->
        <meta charset="utf-8">
        <!-- Character encoding: UTF-8 for full Unicode support -->
        <title>Contact Form</title>
        <!-- Page title shown in browser tab -->
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <!-- Visible content of the page -->
        <div class="form-container">
            <form>
                <!-- Form heading -->
                <h2>Contact Us</h2>
                <label for="name">name</label>
                <input type="text" id="name" name="name"
                required>
                <label for="email">email</label>
                <input type="email" id="email" name="email"
                required>
                <!-- Message field label -->
                <label for="message">message</label>
                <textarea type="message" id="message" name="message" required></textarea >
                    <!-- Submit button -->
                <button type="submit">Submit</button>
            </form>
        </div>
    </body>
</html>
