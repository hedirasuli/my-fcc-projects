<!DOCTYPE html>
<!-- Document type declaration: HTML5 -->
<html lang="en">
  <!-- Root element with language set to English -->

  <head>
    <!-- Meta information and document settings -->
    <meta charset="UTF-8" />
    <title>Piano</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Viewport settings for responsive design on mobile devices -->
    <link rel="stylesheet" href="./styles.css">
    <!-- Link to external stylesheet for piano styling -->
  </head>

  <body>
    <!-- Visible content of the page -->

    <!-- Main piano container -->
    <div id="piano">
      <!-- freeCodeCamp logo image (SVG format) -->
      <img class="logo" src="https://cdn.freecodecamp.org/platform/universal/fcc_primary.svg" alt="freeCodeCamp Logo" />
      <!-- Container for all piano keys -->
      <div class="keys">
        <!-- White and black keys repeated in a typical piano pattern -->
        <div class="key"></div>
        <div class="key black--key"></div>
        <div class="key black--key"></div>
        <div class="key"></div>
        <div class="key black--key"></div>
        <div class="key black--key"></div>
        <div class="key black--key"></div>

        <div class="key"></div>
        <div class="key black--key"></div>
        <div class="key black--key"></div>
        <div class="key"></div>
        <div class="key black--key"></div>
        <div class="key black--key"></div>
        <div class="key black--key"></div>

        <div class="key"></div>
        <div class="key black--key"></div>
        <div class="key black--key"></div>
        <div class="key"></div>
        <div class="key black--key"></div>
        <div class="key black--key"></div>
        <div class="key black--key"></div>
      </div>
      <!-- End of keys container -->
    </div>
    <!-- End of piano container -->
  </body>
</html>
