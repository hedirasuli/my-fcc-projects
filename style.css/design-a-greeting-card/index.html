<!DOCTYPE html>
<!-- Document type declaration: HTML5 -->
<html lang="en">
  <!-- Root element with language set to English -->
  <head>
    <!-- Meta information and document settings -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greeting Card</title>
    <link href="styles.css" rel="stylesheet">
  </head>
  <body>
    <!-- Visible content of the page -->

    <!-- Main greeting card container -->
    <div class="card" id="greeting-card">
      <h1>Happy Birthday!</h1>
      <!-- Card message paragraph -->
      <p class="message">
        Wishing you all the happiness and joy on your special day!
      </p>
      <!-- Card action links container -->
      <div class="card-links">
        <a href="#send" class="send-link">Send Card</a>
        <a href="#share" class="share-link">Share on Social Media</a>
      </div>
  	</div>
    <!-- Section shown when "Send Card" link is clicked (scrolls to this area) -->
  <section id="send">
    <h2>Sending your card...</h2>
    <p>Card successfully sent to your recipient!</p>
  </section>
  <!-- Section shown when "Share on Social Media" link is clicked -->
  <section id="share">
    <h2>Sharing your card...</h2>
    <p>Your card was shared on social media!</p>
  </section>

  </body>
</html>
